<!DOCTYPE html>
<html>
<head>
    <title>A Message For You</title>
    <style>
        body {
            background: linear-gradient(to bottom right, #1f2937, #374151);
            color: #f3f4f6;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: #111827;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 28px;
        }
        p {
            color: #d1d5db;
            line-height: 1.6;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
        .footer {
            margin-top: 20px;
            font-style: italic;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Divya</h1>

    <p>
        I didn’t know how to say everything face to face,
        so I recorded something instead.
        It comes from a real place.
    </p>

    <h3>pls use ear pods</h3>

    <audio controls>
        <source src="voice.mp4" type="">
    </audio>

    <p>
        No matter what happens,
        meeting you meant something to me.
    </p>

    <div class="footer">
        Take your time. I’ll be here.
    </div>
</div>

</body>
</html>
